{% extends 'base.html' %}
{% block title %}Edit Profile — DocBook{% endblock %}
{% block content %}
<div class="form-card">
    <h1>✏️ Edit Profile</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}{% for e in field.errors %}<div class="form-error">{{ e }}</div>{% endfor %}{% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary btn-block">Save Profile</button>
    </form>
    <div class="form-footer"><a href="{% url 'doctor_dashboard' %}">← Back to Dashboard</a></div>
</div>
{% endblock %}
